name: release

# Two ways to publish the Windows binary as a GitHub Release:
#   1. Push a version tag:  git tag v0.1.7 && git push origin v0.1.7
#   2. Just bump <Version> in Directory.Build.props and merge to main — this workflow reads the version
#      and, if no release exists for it yet, builds and publishes v<version> automatically.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, e.g. v0.1.7'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $event = '${{ github.event_name }}'
          $ref   = '${{ github.ref }}'
          if ($event -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
            $should = 'true'
          }
          elseif ($ref -like 'refs/tags/*') {
            $tag = '${{ github.ref_name }}'
            $should = 'true'
          }
          else {
            # Push to main/master: derive the tag from the project version and only release it once.
            $m = Select-String -Path Directory.Build.props -Pattern '<Version>\s*([^<]+?)\s*</Version>' | Select-Object -First 1
            if (-not $m) { throw 'Could not find <Version> in Directory.Build.props.' }
            $ver = $m.Matches[0].Groups[1].Value.Trim()
            $tag = "v$ver"
            # gh release view exits non-zero when the release doesn't exist yet. Capture that result, then
            # clear $LASTEXITCODE — otherwise the runner's trailing `exit $LASTEXITCODE` fails this step
            # (this is why merge-triggered releases failed while manual tag pushes, which skip this branch,
            # worked).
            gh release view $tag --repo $env:GITHUB_REPOSITORY 1>$null 2>$null
            $should = if ($LASTEXITCODE -eq 0) { 'false' } else { 'true' }
            $global:LASTEXITCODE = 0
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "should_release=$should" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "event=$event tag=$tag should_release=$should"

      - name: Setup .NET
        if: steps.ver.outputs.should_release == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file
        if: steps.ver.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet publish src/LingoLens.App/LingoLens.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -o publish/out
          # Fail fast on a compile error. Without this the script kept going and tripped on the LICENSE
          # copy below, hiding the real build error behind a confusing "path not found".
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed (exit $LASTEXITCODE) - see build errors above." }
          Remove-Item publish/out/*.pdb, publish/out/*.lib -Force -ErrorAction SilentlyContinue
          Copy-Item LICENSE publish/out/LICENSE.txt -Force

      - name: Package
        id: pkg
        if: steps.ver.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $zip = "publish/LingoLens-$tag-win-x64.zip"
          Compress-Archive -Path publish/out/* -DestinationPath $zip -Force -CompressionLevel Optimal
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        if: steps.ver.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $zip = '${{ steps.pkg.outputs.zip }}'
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber
          } else {
            $createArgs = @($tag, $zip, '--title', "LingoLens $tag", '--generate-notes')
            if ($tag -match '-') { $createArgs += '--prerelease' }
            gh release create @createArgs
          }
