name: release

# Tag a commit (e.g. `git tag v0.1.1 && git push origin v0.1.1`) and this builds the
# self-contained Windows binary and publishes it as a GitHub Release automatically.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist), e.g. v0.1.1'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish self-contained single-file
        shell: pwsh
        run: |
          dotnet publish src/LingoLens.App/LingoLens.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -o publish/out
          Remove-Item publish/out/*.pdb, publish/out/*.lib -Force -ErrorAction SilentlyContinue
          Copy-Item LICENSE publish/out/LICENSE.txt -Force

      - name: Package
        id: pkg
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $zip = "publish/LingoLens-$tag-win-x64.zip"
          Compress-Archive -Path publish/out/* -DestinationPath $zip -Force -CompressionLevel Optimal
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $zip = '${{ steps.pkg.outputs.zip }}'
          $pre = if ($tag -match '-') { '--prerelease' } else { '' }
          if (gh release view $tag 2>$null) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --title "LingoLens $tag" --generate-notes $pre
          }
